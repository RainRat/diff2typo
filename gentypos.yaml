# Configuration for Fake Typo Generator

# File Paths
input_file: "wordlist_small.txt"       # Path to the source words (one per line)
dictionary_file: "wordlist_large.txt"     # Path to the valid words (used to filter out real words)
output_file: "typos_mega.toml"     # Path to the output file

# Output_format options: arrow, csv, table, list
# Default: table
output_format: "table"

# Number of times to repeat typo generation, stacking modifications
repeat_modifications: 1

# Typo Generation Options
typo_types:
  deletion: true                        # Skipping a letter: "word" becomes "wrd"
  transposition: true                   # Swapping two letters: "word" becomes "wrod"
  replacement: true                     # Hitting a nearby key: "word" becomes "wprd"
  duplication: true                     # Typing a letter twice: "word" becomes "woord"

# Replacement Options
replacement_options:
  include_diagonals: false              # Exclude diagonally adjacent keys in replacements
  enable_adjacent_substitutions: true   # Enable adjacent-key-based substitutions
  enable_custom_substitutions: true     # Enable custom substitution rules

# Transposition Options
transposition_options:
  distance: 1                           # 1 for adjacent, 2 for a gap of one character

# Custom Substitutions
custom_substitutions:
  a:
  - "e"
  - "i"
  - "o"
  c:
  - "s"
  e:
  - "a"
  - "ea"
  - "er"
  - "es"
  - "i"
  - "o"
  i:
  - "a"
  - "e"
  - "it"
  - "o"
  - "u"
  l:
  - "le"
  m:
  - "n"
  n:
  - "m"
  - "ne"
  o:
  - "a"
  - "e"
  - "i"
  - "on"
  r:
  - "re"
  s:
  - "c"
  t:
  - "c"
  - "d"
  - "te"
  - "ti"

# Word Length Filters
word_length:
  min_length: 3                         # Minimum word length to generate typos
  max_length: 20                        # Maximum word length to generate typos
