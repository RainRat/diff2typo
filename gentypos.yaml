# Configuration for Fake Typo Generator

# File Paths
input_file: "wordlist_small.txt"       # Path to the source words
dictionary_file: "wordlist_large.txt"     # Path to the list of valid words
output_file: "typos.txt"            # Path to the output file

# Output_format options: arrow, csv, table, list
# Default: arrow
output_format: "arrow"

# How many times to repeat the process on the same word
repeat_modifications: 1

# Typo Generation Options
typo_types:
  deletion: true                        # Skipping a letter (e.g., 'hello' -> 'helo')
  transposition: true                   # Swapping two letters (e.g., 'the' -> 'teh')
  replacement: true                     # Hitting the wrong key (e.g., 'key' -> 'ley')
  duplication: true                     # Typing a letter twice (e.g., 'word' -> 'woord')

# Replacement Options
replacement_options:
  include_diagonals: false              # Include keys that are diagonal on the keyboard
  enable_adjacent_substitutions: true   # Use keys that are next to each other
  enable_custom_substitutions: true     # Use your own custom patterns (defined below)

# Transposition Options
transposition_options:
  distance: 1                           # 1 for adjacent letters, 2 for a gap of one character

# Custom Patterns
# These define common mistakes for specific letters or patterns.
custom_substitutions:
  a:
  - "e"
  - "i"
  - "o"
  c:
  - "s"
  e:
  - "a"
  - "ea"
  - "er"
  - "es"
  - "i"
  - "o"
  i:
  - "a"
  - "e"
  - "it"
  - "o"
  - "u"
  l:
  - "le"
  m:
  - "n"
  n:
  - "m"
  - "ne"
  o:
  - "a"
  - "e"
  - "i"
  - "on"
  r:
  - "re"
  s:
  - "c"
  t:
  - "c"
  - "d"
  - "te"
  - "ti"

# Word Length Filters
word_length:
  min_length: 3                         # Minimum word length
  max_length: 20                        # Maximum word length
